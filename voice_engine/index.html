<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { margin: 0; padding: 0; overflow: hidden; background: #f8fafc; font-family: -apple-system, sans-serif; }
      #ui { 
        padding: 15px; 
        border-radius: 12px; 
        text-align: center; 
        border: 2px solid #e2e8f0;
      }
      .btn {
        background: #ef4444; 
        color: white; 
        border: none; 
        padding: 12px; 
        border-radius: 8px; 
        cursor: pointer; 
        font-weight: bold; 
        font-size: 16px; 
        width: 100%;
        animation: pulse 2s infinite;
      }
      .active { background: #10b981 !important; animation: none !important; }
      @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
      #gps { margin-top: 8px; font-size: 12px; font-weight: 600; }
    </script>
  </head>
  <body>
    <div id="ui">
        <button id="unlock-btn" class="btn" onclick="unlockVoice()">
            🚨 TAP HERE TO ACTIVATE VOICE 🔊
        </button>
        <div id="gps" style="color: #64748b;">Waiting for Voice Unlock...</div>
    </div>
    <script src="main.js"></script>
  </body>
</html>
